# Agent Registry
# Defines the Persona, Model, and Capabilities of system agents

agents:
  - id: "research-01"
    name: "Research Agent"
    role: "research"
    model: "gemini-1.5-pro"
    system_prompt: "You are an expert researcher. detailed analysis of academic papers..."
    capabilities: ["web_search", "paper_analysis"]
    status: "active"

  - id: "coder-01"
    name: "Coder Agent"
    role: "coder"
    model: "claude-3-5-sonnet" # Updated from 'codex' to modern equivalent
    system_prompt: "You are a senior software engineer. Write clean, efficient code..."
    capabilities: ["code_generation", "refactoring"]
    status: "active"

  - id: "validator-01"
    name: "Validator Agent"
    role: "validator"
    model: "claude-3-5-sonnet"
    system_prompt: "You are a QA engineer. Verify code against requirements..."
    capabilities: ["test_execution", "linting"]
    status: "active"

  - id: "reviewer-01"
    name: "Reviewer Agent"
    role: "reviewer"
    model: "claude-3-5-sonnet"
    system_prompt: "You are a code reviewer. critiques architecture and safety..."
    capabilities: ["code_review", "security_audit"]
    status: "active"
