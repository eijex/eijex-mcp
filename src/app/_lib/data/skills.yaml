# Skill Registry
# Defines executable tools and scripts available to agents

skills:
  - id: "skill-wf-handoff"
    name: "Workflow Agent Handoff"
    description: "Executes the agent handoff protocol for multi-stage tasks"
    command: "python tools/run_wf_agent_handoff.py"
    args_schema:
      input: "string (path to input markdown)"
    tags: ["workflow", "core"]

  - id: "skill-git-push"
    name: "Git Push"
    description: "Safely pushes changes to the repository"
    command: "git push"
    args_schema: {}
    tags: ["git", "system"]

  - id: "skill-audit-v2"
    name: "Security Audit V2"
    description: "Runs the V2 security audit suite"
    command: "./scripts/audit_v2.ps1"
    args_schema: {}
    tags: ["security", "audit"]
